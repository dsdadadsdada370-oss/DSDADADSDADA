```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS DADA FREE FIRE</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#00ff9c;
}

/* LOGIN BOX */

.container{
width:320px;
margin:120px auto;
background:#111;
padding:25px;
border:1px solid #00ff9c;
text-align:center;
box-shadow:0 0 20px #00ff9c;
}

input{
width:100%;
padding:10px;
margin:8px 0;
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
}

button{
width:100%;
padding:10px;
background:#00ff9c;
border:none;
color:black;
cursor:pointer;
font-weight:bold;
}

.link{
color:#00ff9c;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{
display:none;
}

/* SIDEBAR */

.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
border-right:1px solid #00ff9c;
}

.sidebar a{
display:block;
padding:12px;
text-decoration:none;
color:#00ff9c;
}

.sidebar a:hover{
background:#00ff9c;
color:black;
}

.menuBtn{
font-size:22px;
background:black;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
cursor:pointer;
}

.content{
padding:20px;
}

/* COMMAND BOX */

.commandBox input{
width:70%;
}

.commandBox button{
width:25%;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="container" id="loginPage">

<h2>DS DADA FREE FIRE</h2>

<input id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p>New user? <span class="link" onclick="showRegister()">Register</span></p>

<p id="loginMsg"></p>

</div>


<!-- REGISTER PAGE -->

<div class="container" id="registerPage" style="display:none">

<h2>REGISTER</h2>

<input id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">REGISTER</button>

<p>Already account? <span class="link" onclick="showLogin()">Login</span></p>

<p id="regMsg"></p>

</div>


<!-- DASHBOARD -->

<div id="dashboard">

<div class="sidebar" id="sidebar">

<a href="#" onclick="home()">Home</a>
<a href="#" onclick="profile()">Profile</a>
<a href="#" onclick="commands()">Command Panel</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<button class="menuBtn" onclick="menu()">☰</button>

<div class="content" id="content">

<h2>WELCOME TO DS DADA FREE FIRE</h2>
<p>Select option from menu</p>

</div>

</div>


<script>

/* PAGE SWITCH */

function showRegister(){
loginPage.style.display="none"
registerPage.style.display="block"
}

function showLogin(){
registerPage.style.display="none"
loginPage.style.display="block"
}

/* REGISTER */

function register(){

let u=regUser.value
let p=regPass.value

if(u==""||p==""){
regMsg.innerText="Fill all fields"
return
}

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

regMsg.innerText="Registration Successful"

}

/* LOGIN */

function login(){

let u=loginUser.value
let p=loginPass.value

let su=localStorage.getItem("user")
let sp=localStorage.getItem("pass")

if(u==su && p==sp){

loginPage.style.display="none"
dashboard.style.display="block"

}else{

loginMsg.innerText="Wrong login"

}

}

/* MENU */

function menu(){

let m=sidebar

if(m.style.width=="200px"){
m.style.width="0"
}else{
m.style.width="200px"
}

}

/* PAGES */

function home(){

content.innerHTML="<h2>Home</h2><p>DS DADA FREE FIRE Control Panel</p>"

}

function profile(){

let u=localStorage.getItem("user")

content.innerHTML="<h2>Profile</h2><p>User: "+u+"</p>"

}

function commands(){

content.innerHTML=`

<h2>Command Panel</h2>

<div class="commandBox">

<input id="cmd" placeholder="Enter command">
<button onclick="run()">Run</button>

<p id="result"></p>

</div>

`

}

function run(){

let c=document.getElementById("cmd").value
let r=document.getElementById("result")

if(c=="hello"){
r.innerText="Hello Boss 😎"
}
else if(c=="ff"){
r.innerText="BOOYAH 🔥"
}
else if(c=="panel"){
r.innerText="Admin Panel Active"
}
else{
r.innerText="Unknown Command"
}

}

/* LOGOUT */

function logout(){

dashboard.style.display="none"
loginPage.style.display="block"

}

</script>

</body>
</html>
```
