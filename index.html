```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS DADA FREE FIRE</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#00ff9c;
}

/* LOGIN / REGISTER BOX */

.container{
width:320px;
margin:120px auto;
background:#111;
padding:25px;
border:1px solid #00ff9c;
text-align:center;
box-shadow:0 0 20px #00ff9c;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
}

button{
width:100%;
padding:10px;
background:#00ff9c;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
}

.link{
color:#00ff9c;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{
display:none;
}

/* SIDEBAR */

.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
border-right:1px solid #00ff9c;
}

.sidebar a{
display:block;
padding:12px;
text-decoration:none;
color:#00ff9c;
}

.sidebar a:hover{
background:#00ff9c;
color:black;
}

.menuBtn{
font-size:22px;
background:black;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
cursor:pointer;
margin:10px;
}

.content{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #00ff9c;
padding:10px;
text-align:center;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="container" id="loginPage">

<h2>DS DADA FREE FIRE</h2>

<input id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p>New user? <span class="link" onclick="showRegister()">Register</span></p>

<p id="loginMsg"></p>

</div>


<!-- REGISTER PAGE -->

<div class="container" id="registerPage" style="display:none">

<h2>REGISTER</h2>

<input id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">REGISTER</button>

<p>Already account? <span class="link" onclick="showLogin()">Login</span></p>

<p id="regMsg"></p>

</div>


<!-- DASHBOARD -->

<div id="dashboard">

<div class="sidebar" id="sidebar">

<a href="#" onclick="home()">Home</a>
<a href="#" onclick="profile()">Profile</a>
<a href="#" onclick="guild()">Guild Glory</a>
<a href="#" onclick="commands()">Command Panel</a>
<a href="#" onclick="adminPanel()">Admin Panel</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<button class="menuBtn" onclick="menu()">☰ MENU</button>

<div class="content" id="content">

<h2>Welcome to DS DADA FREE FIRE Panel</h2>

</div>

</div>


<script>

/* PAGE SWITCH */

function showRegister(){
loginPage.style.display="none"
registerPage.style.display="block"
}

function showLogin(){
registerPage.style.display="none"
loginPage.style.display="block"
}

/* REGISTER */

function register(){

let u=regUser.value
let p=regPass.value

if(u==""||p==""){
regMsg.innerText="Fill all fields"
return
}

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

regMsg.innerText="Registration Successful"

}

/* LOGIN */

function login(){

let u=loginUser.value
let p=loginPass.value

let su=localStorage.getItem("user")
let sp=localStorage.getItem("pass")

if(u==su && p==sp){

loginPage.style.display="none"
dashboard.style.display="block"

}else{

loginMsg.innerText="Wrong Username or Password"

}

}

/* MENU */

function menu(){

let m=sidebar

if(m.style.width=="200px"){
m.style.width="0"
}else{
m.style.width="200px"
}

}

/* OUTSIDE CLICK = MENU HIDE */

document.addEventListener("click",function(e){

if(!sidebar.contains(e.target) && !e.target.classList.contains("menuBtn")){
sidebar.style.width="0"
}

})

/* HOME */

function home(){

content.innerHTML="<h2>Dashboard</h2><p>Welcome to DS DADA FREE FIRE Panel</p>"

}

/* PROFILE */

function profile(){

let u=localStorage.getItem("user")

content.innerHTML="<h2>Profile</h2><p>User: "+u+"</p>"

}

/* GUILD GLORY */

function guild(){

content.innerHTML=`

<h2>Guild Glory</h2>

<input id="uid" placeholder="Enter UID">

<select id="region">
<option>India</option>
<option>Bangladesh</option>
<option>Singapore</option>
<option>Brazil</option>
<option>Middle East</option>
<option>Thailand</option>
<option>Indonesia</option>
</select>

<button onclick="sendGlory()">Send Glory</button>

<p id="gloryResult"></p>

`

}

function sendGlory(){

let uid=document.getElementById("uid").value
let region=document.getElementById("region").value

if(uid==""){
document.getElementById("gloryResult").innerText="Enter UID first"
return
}

document.getElementById("gloryResult").innerText=
"Glory request sent to UID "+uid+" ("+region+")"

}

/* COMMAND PANEL */

function commands(){

content.innerHTML=`

<h2>Command Panel</h2>

<input id="cmd" placeholder="Enter command">

<button onclick="run()">Run</button>

<p id="result"></p>

`

}

function run(){

let c=document.getElementById("cmd").value
let r=document.getElementById("result")

if(c=="hello"){
r.innerText="Hello Boss 😎"
}
else if(c=="ff"){
r.innerText="BOOYAH 🔥"
}
else{
r.innerText="Unknown Command"
}

}

/* ADMIN PANEL */

function adminPanel(){

let user=localStorage.getItem("user")
let pass=localStorage.getItem("pass")

content.innerHTML=`

<h2>Admin Panel</h2>

<table>

<tr>
<th>Username</th>
<th>Password</th>
</tr>

<tr>
<td>${user}</td>
<td>${pass}</td>
</tr>

</table>

`

}

/* LOGOUT */

function logout(){

dashboard.style.display="none"
loginPage.style.display="block"

}

</script>

</body>
</html>
```
